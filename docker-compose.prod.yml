version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: orca-app
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - ORCA_PORT=3000
      - ORCA_HOST=0.0.0.0
      - ORCA_DB_TYPE=postgresql
      - ORCA_DB_HOST=postgres
      - ORCA_DB_PORT=5432
      - ORCA_DB_NAME=orca
      - ORCA_DB_USER=orca
      - ORCA_DB_PASSWORD=${POSTGRES_PASSWORD}
      - ORCA_REDIS_URL=redis://redis:6379
      - ORCA_LOG_LEVEL=warn
      - ORCA_TLS_ENABLED=true
      - ORCA_TLS_CERT_PATH=/certs/server.crt
      - ORCA_TLS_KEY_PATH=/certs/server.key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-data:/app/data
      - ./certs:/certs:ro
    networks:
      - orca-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get({hostname:'localhost',port:3000,path:'/health',rejectUnauthorized:false},(r)=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: orca-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_DB=orca
      - POSTGRES_USER=orca
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - orca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca -d orca"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - orca-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: orca-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    depends_on:
      - app
    networks:
      - orca-network

volumes:
  app-data:
  postgres-data:
  redis-data:

networks:
  orca-network:
    driver: bridge
