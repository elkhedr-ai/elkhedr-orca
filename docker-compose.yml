version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: orca-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - ORCA_PORT=3000
      - ORCA_HOST=0.0.0.0
      - ORCA_DB_TYPE=postgresql
      - ORCA_DB_HOST=postgres
      - ORCA_DB_PORT=5432
      - ORCA_DB_NAME=orca
      - ORCA_DB_USER=orca
      - ORCA_DB_PASSWORD=orca_password
      - ORCA_REDIS_URL=redis://redis:6379
      - ORCA_LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
    networks:
      - orca-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: orca-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=orca
      - POSTGRES_USER=orca
      - POSTGRES_PASSWORD=orca_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - orca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca -d orca"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - orca-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  dashboard:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: orca-dashboard
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    depends_on:
      - app
    networks:
      - orca-network

volumes:
  postgres-data:
  redis-data:

networks:
  orca-network:
    driver: bridge
